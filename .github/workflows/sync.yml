name: Daily Catalog Sync

'on':
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update JSON files
        run: |
          set -euo pipefail
          BASE=https://sailsandshore.com/api/v1
          for f in entities datapoints questions sources; do
            curl -sSL --fail-with-body "$BASE/$f.json" > "$f.new"
            jq -e . "$f.new" > /dev/null
            mv "$f.new" "$f.json"
          done

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name sailsandshore-sync-bot
          git config user.email bot@sailsandshore.com
          git add entities.json datapoints.json questions.json sources.json
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "sync: daily catalog refresh"
          git push
